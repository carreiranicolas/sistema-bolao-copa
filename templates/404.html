{% extends 'base.html' %}
{% load static %}

{% block title %}
Página Não Encontrada (404)
{% endblock %}

{% block content %}
<div class="container my-5 py-4">
    <div class="row justify-content-center text-center">
        <div class="col-12 col-md-10 col-lg-8">
            
            <!-- Imagem Personalizada de Erro 404 -->
            <div class="mb-4">
                <img src="{% static 'imagens/imagem404.png' %}" 
                     alt="Erro 404 - A trave tava ali, mas o gol sumiu" 
                     class="img-fluid rounded-4 shadow-sm" 
                     style="max-height: 500px; object-fit: contain;">
            </div>

            <!-- Único elemento extra: Botão de salvamento para o usuário voltar -->
            <div class="mt-4">
                <a href="{% url 'campeonato:home' %}" class="btn btn-primary px-4 py-2 fw-bold shadow-sm rounded-pill">
                    <i class="bi bi-house-door me-2"></i> Voltar para a Home
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
